<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108">
  <!-- 微调 4「八芒星」：4 长（白）+ 4 短（浅蓝）叠成八芒 sparkle，无环无黄。星味足又保留指向 -->
  <rect x="0" y="0" width="108" height="108" rx="24" fill="#1F2A44"/>
  <!-- 次级斜向短芒（浅蓝，垫底） -->
  <path d="M63,45 L59,54 L63,63 L54,59 L45,63 L49,54 L45,45 L54,49 Z" fill="#7FB3FF"/>
  <!-- 主四芒（白，长） -->
  <path d="M54,24 L60,48 L84,54 L60,60 L54,84 L48,60 L24,54 L48,48 Z" fill="#FFFFFF"/>
</svg>
